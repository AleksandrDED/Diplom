services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: guard
      POSTGRES_USER: guard
      POSTGRES_PASSWORD: guard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://guard:guard@db:5432/guard
      JWT_SECRET_KEY: change-me-in-prod
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pgdata:

