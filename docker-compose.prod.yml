services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: guard
      POSTGRES_USER: guard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guard}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guard -d guard"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-80}:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://guard:${POSTGRES_PASSWORD:-guard}@db:5432/guard
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin12345!}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-Администратор}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
